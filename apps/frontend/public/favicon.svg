<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#0a0a1a" rx="4"/>

  <!-- Orbit rings -->
  <circle cx="16" cy="16" r="6"  fill="none" stroke="#2a3a5a" stroke-width="0.6" opacity="0.7"/>
  <circle cx="16" cy="16" r="9"  fill="none" stroke="#2a3a5a" stroke-width="0.6" opacity="0.5"/>
  <circle cx="16" cy="16" r="12" fill="none" stroke="#2a3a5a" stroke-width="0.6" opacity="0.3"/>

  <!-- Sun (corona glow) -->
  <circle cx="16" cy="16" r="3.8" fill="#ff8c00" opacity="0.3"/>
  <!-- Sun surface -->
  <circle cx="16" cy="16" r="3" fill="#ffcc00"/>
  <!-- Sun highlight -->
  <circle cx="14.8" cy="14.8" r="1" fill="#fff7aa" opacity="0.6"/>

  <!-- Planet on inner orbit (Mercury-like) -->
  <circle cx="22" cy="16" r="0.9" fill="#b0a090"/>

  <!-- Planet on mid orbit (Earth-like, blue) -->
  <circle cx="16" cy="7"  r="1.1" fill="#2266cc"/>

  <!-- Planet on outer orbit (Saturn-like with ring) -->
  <ellipse cx="5.5" cy="12.5" rx="2.5" ry="0.55" fill="none" stroke="#c8a060" stroke-width="0.7" opacity="0.8"/>
  <circle  cx="5.5" cy="12.5" r="1.4" fill="#e0b870"/>
</svg>
